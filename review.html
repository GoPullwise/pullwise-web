<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pullwise — AI 代码 Review 助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/base.css" />
<link rel="stylesheet" href="styles/screens.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/i18n.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/screens/public.jsx"></script>
<script type="text/babel" src="src/screens/flow.jsx"></script>
<script type="text/babel" src="src/screens/dashboard.jsx"></script>
<script type="text/babel" src="src/screens/issues.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// Locked design tokens — purple accent, serif type, list layout.
const ACCENT = "#6366f1";
const LAYOUT = "list";

function Nav({ go, current }) {
  const screens = [
    { k: "landing", t: "Landing" },
    { k: "pricing", t: "定价" },
    { k: "docs", t: "文档" },
    { k: "login", t: "登录" },
    { k: "oauth", t: "OAuth" },
    { k: "repos", t: "选仓库" },
    { k: "scanning", t: "扫描中" },
    { k: "dashboard", t: "Dashboard" },
    { k: "issues", t: "Issues" },
    { k: "issue", t: "详情" },
    { k: "history", t: "历史" },
    { k: "settings", t: "设置" },
  ];
  return (
    <div className="proto-nav">
      <div className="proto-nav-l">
        <span className="proto-nav-brand">PR · Prototype</span>
      </div>
      <div className="proto-nav-screens">
        {screens.map((s, i) => (
          <button
            key={s.k}
            className={"proto-nav-i" + (current === s.k ? " on" : "")}
            onClick={() => go(s.k)}
          >
            <span className="proto-nav-n">{String(i+1).padStart(2,"0")}</span>
            {s.t}
          </button>
        ))}
      </div>
      <div className="proto-nav-hint">↑ 点击跳转任意原型页面</div>
    </div>
  );
}

function App() {
  const lang = useLang();
  const [theme, setTheme] = useState(() => localStorage.getItem("pw-theme") || "light");
  const [screen, setScreen] = useState("landing");
  const [issue, setIssue] = useState(null);
  const [activeRepo, setActiveRepo] = useState(null);
  const [navOpen, setNavOpen] = useState(true);

  const go = (s) => {
    setScreen(s);
    window.scrollTo({ top: 0 });
  };

  // theme side effect
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    document.documentElement.style.setProperty("--accent", ACCENT);
    document.documentElement.style.setProperty("--font-sans", "'Source Serif 4', ui-serif, Georgia, serif");
    document.documentElement.style.setProperty("--font-display", "'Instrument Serif', 'Source Serif 4', ui-serif, Georgia, serif");
    localStorage.setItem("pw-theme", theme);
  }, [theme]);

  let body;
  switch (screen) {
    case "landing": body = <LandingScreen go={go} accent={ACCENT} />; break;
    case "pricing": body = <PricingScreen go={go} accent={ACCENT} />; break;
    case "docs": body = <DocsScreen go={go} accent={ACCENT} />; break;
    case "login": body = <LoginScreen go={go} />; break;
    case "oauth": body = <OAuthScreen go={go} />; break;
    case "repos": body = <ReposScreen go={go} setActiveRepo={setActiveRepo} />; break;
    case "scanning": body = <ScanningScreen go={go} activeRepo={activeRepo} />; break;
    case "dashboard": body = <DashboardScreen go={go} layout={LAYOUT} setIssue={setIssue} accent={ACCENT} />; break;
    case "issues": body = <IssuesScreen go={go} setIssue={setIssue} />; break;
    case "issue": body = <IssueDetailScreen go={go} issue={issue || window.FIXTURES.ISSUES[0]} />; break;
    case "history": body = <HistoryScreen go={go} />; break;
    case "settings": body = <SettingsScreen go={go} />; break;
    default: body = <LandingScreen go={go} accent={ACCENT} />;
  }

  return (
    <>
      <button className="proto-nav-toggle" onClick={() => setNavOpen(o => !o)}>
        {navOpen ? "▸" : "◂"}
      </button>
      {navOpen && <Nav go={go} current={screen} />}
      <div data-screen-label={screen} key={screen}>
        {body}
      </div>

      <button
        className="lang-toggle"
        onClick={() => setLang(lang === "en" ? "zh" : "en")}
        title={lang === "en" ? "切换到中文" : "Switch to English"}
        aria-label="Switch language"
      >
        {lang === "en" ? "中" : "EN"}
      </button>
      <button
        className="theme-toggle"
        onClick={() => setTheme(theme === "light" ? "dark" : "light")}
        title={theme === "light" ? T("Switch to dark", "切换到暗色") : T("Switch to light", "切换到亮色")}
        aria-label={T("Toggle theme", "切换主题")}
      >
        {theme === "light" ? (
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        ) : (
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        )}
      </button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<style>
/* Prototype navigator overlay */
.proto-nav {
  position: fixed;
  left: 0; right: 0; top: 0;
  z-index: 50;
  background: rgba(10,10,10,.92);
  backdrop-filter: blur(14px);
  color: rgba(255,255,255,.92);
  border-bottom: 1px solid rgba(255,255,255,.08);
  padding: 8px 14px 8px 50px;
  display: flex;
  align-items: center;
  gap: 18px;
  font: 11.5px/1 'Geist', ui-sans-serif, sans-serif;
}
.proto-nav-l { font-weight: 600; letter-spacing: .04em; opacity: .85; flex: 0 0 auto; }
.proto-nav-screens {
  display: flex;
  gap: 4px;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.proto-nav-screens::-webkit-scrollbar { display: none; }
.proto-nav-i {
  background: transparent;
  border: 1px solid transparent;
  color: rgba(255,255,255,.6);
  padding: 6px 10px;
  border-radius: 6px;
  font: 11.5px/1 'Geist', ui-sans-serif, sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.proto-nav-i:hover { color: white; background: rgba(255,255,255,.06); }
.proto-nav-i.on { color: white; background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.16); }
.proto-nav-n { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10px; opacity: .55; }
.proto-nav-hint { color: rgba(255,255,255,.4); font-size: 10.5px; flex: 0 0 auto; }

.proto-nav-toggle {
  position: fixed;
  left: 8px; top: 6px;
  z-index: 51;
  width: 30px; height: 26px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,.16);
  background: rgba(10,10,10,.92);
  color: white;
  font-size: 12px;
}

.lang-toggle {
  position: fixed;
  right: 66px; bottom: 18px;
  z-index: 60;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text);
  display: grid;
  place-items: center;
  cursor: pointer;
  font: 600 12px/1 var(--font-mono);
  letter-spacing: .02em;
  box-shadow: 0 6px 22px rgba(0,0,0,.10);
  transition: transform .15s ease, background .15s ease;
}
.lang-toggle:hover { transform: translateY(-1px); background: var(--bg); }

.theme-toggle {
  position: fixed;
  right: 18px; bottom: 18px;
  z-index: 60;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text);
  display: grid;
  place-items: center;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(0,0,0,.10);
  transition: transform .15s ease, background .15s ease;
}
.theme-toggle:hover { transform: translateY(-1px); background: var(--bg); }
.theme-toggle svg { display: block; }

body { padding-top: 42px; }
</style>
</body>
</html>
